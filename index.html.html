<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe Stars PRO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0f0f;
            position: relative;
            overflow: hidden;
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.2;
            }

            50% {
                opacity: 1;
            }
        }

        #profileBox {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(28, 28, 28, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 100;
            border: 1px solid #4a90e2;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #userDisplay {
            font-weight: bold;
            background: #4a90e2;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 14px;
        }

        #starsDisplay {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 16px;
        }

        #menuButtons {
            position: absolute;
            top: 20px;
            right: 280px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .menu-btn {
            padding: 10px 18px;
            background: rgba(51, 51, 51, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

            .menu-btn:hover {
                background: #4a90e2;
            }

            .menu-btn#logoutBtn {
                background: rgba(139, 0, 0, 0.9);
            }

        #leaderboardBox {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            background: rgba(28, 28, 28, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #4a90e2;
            z-index: 90;
            max-height: 80vh;
            overflow-y: auto;
        }

            #leaderboardBox h3 {
                margin-bottom: 20px;
                color: #4a90e2;
                border-bottom: 1px solid #333;
                padding-bottom: 10px;
            }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            margin: 5px 0;
            background: rgba(17, 17, 17, 0.8);
            border-radius: 10px;
        }

            .leaderboard-item.top-1 {
                background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05));
                border: 1px solid gold;
            }

            .leaderboard-item.top-2 {
                background: linear-gradient(135deg, rgba(192,192,192,0.2), rgba(192,192,192,0.05));
                border: 1px solid silver;
            }

            .leaderboard-item.top-3 {
                background: linear-gradient(135deg, rgba(205,127,50,0.2), rgba(205,127,50,0.05));
                border: 1px solid #cd7f32;
            }

            .leaderboard-item.current-user {
                border: 2px solid #4a90e2;
            }

        .rank {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #333;
            border-radius: 50%;
            font-weight: bold;
            font-size: 12px;
        }

        .player-name {
            flex: 1;
            font-weight: bold;
            font-size: 14px;
        }

        .player-score {
            font-weight: bold;
            color: #4a90e2;
            font-size: 16px;
        }

        .leaderboard-count {
            text-align: center;
            margin-top: 15px;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-size: 12px;
            color: #aaa;
        }

        #matchHistoryBox {
            position: absolute;
            left: 350px;
            top: 50%;
            transform: translateY(-50%);
            width: 240px;
            background: rgba(28, 28, 28, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #4a90e2;
            max-height: 70vh;
            overflow-y: auto;
        }

            #matchHistoryBox h3 {
                margin-bottom: 20px;
                color: #4a90e2;
                border-bottom: 1px solid #333;
                padding-bottom: 10px;
            }

        .historyItem {
            background: rgba(17, 17, 17, 0.8);
            padding: 8px;
            margin: 5px 0;
            border-radius: 8px;
            font-size: 12px;
            border-left: 3px solid;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid #4a90e2;
        }

        .board {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(3,100px);
            grid-template-rows: repeat(3,100px);
            gap: 8px;
        }

        .cell {
            background: rgba(30, 30, 30, 0.9);
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 15px;
            height: 100px;
            width: 100px;
            border: 2px solid transparent;
        }

            .cell:hover {
                border-color: #4a90e2;
            }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #333, #444);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 50px;
            font-size: 16px;
        }

            button:hover {
                background: #4a90e2;
            }

        #welcomeOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #welcomeBox {
            background: rgba(28, 28, 28, 0.98);
            padding: 50px;
            border-radius: 30px;
            width: 420px;
            text-align: center;
            border: 2px solid #4a90e2;
        }

            #welcomeBox h2 {
                margin-bottom: 20px;
                color: #4a90e2;
            }

            #welcomeBox input {
                width: 100%;
                padding: 15px;
                margin: 10px 0;
                background: rgba(51, 51, 51, 0.9);
                border: 2px solid #4a90e2;
                color: white;
                border-radius: 50px;
                font-size: 16px;
            }

            #welcomeBox button {
                width: 100%;
                padding: 15px;
                margin: 8px 0;
                font-size: 16px;
            }

        #registerBtn {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modalContent {
            background: rgba(28, 28, 28, 0.98);
            padding: 30px;
            border-radius: 25px;
            width: 500px;
            border: 2px solid #4a90e2;
        }

        .closeBtn {
            float: right;
            cursor: pointer;
            font-size: 24px;
        }

        .stats {
            background: rgba(17, 17, 17, 0.9);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .statItem {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            padding: 8px;
            background: rgba(26, 26, 26, 0.9);
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="stars" id="stars"></div>

    <div id="welcomeOverlay">
        <div id="welcomeBox">
            <h2>🎮 Tic Tac Toe Stars</h2>
            <p>Введите данные для входа</p>
            <input type="text" id="loginUsername" placeholder="@username" value="">
            <input type="password" id="loginPassword" placeholder="4-значный пароль" maxlength="4">
            <div id="authError" style="color: #ff6b6b; display: none;"></div>
            <button onclick="handleLogin()">🔑 Войти</button>
            <button id="registerBtn" onclick="handleRegister()">✨ Зарегистрироваться</button>
        </div>
    </div>

    <div id="menuButtons">
        <button class="menu-btn" id="logoutBtn" onclick="logout()">🚪 Выйти</button>
    </div>

    <div id="profileBox" onclick="openProfile()">
        <div id="userDisplay">👤 Загрузка...</div>
        <div id="starsDisplay">⭐ 0</div>
    </div>

    <div id="leaderboardBox">
        <h3>🏆 Топ игроков МИРА</h3>
        <div id="leaderboardList"></div>
        <div class="leaderboard-count" id="leaderboardCount">Всего игроков: 0</div>
    </div>

    <div id="matchHistoryBox">
        <h3>📊 Последние матчи</h3>
        <div id="matchHistory"></div>
    </div>

    <div id="profileModal" class="modal">
        <div class="modalContent">
            <div class="closeBtn" onclick="closeProfile()">✖</div>
            <h2>👤 Профиль</h2>
            <div class="stats">
                <div class="statItem"><span>Username:</span> <span id="profileUsername"></span></div>
                <div class="statItem"><span>Баланс:</span> <span id="modalStars">0 ⭐</span></div>
                <div class="statItem"><span>Побед:</span> <span id="totalWins">0</span></div>
                <div class="statItem"><span>Поражений:</span> <span id="totalLosses">0</span></div>
                <div class="statItem"><span>Ничьих:</span> <span id="totalDraws">0</span></div>
                <div class="statItem"><span>Место в мире:</span> <span id="playerRank">-</span></div>
            </div>
            <button onclick="withdraw()" id="withdrawBtn" style="width:100%; padding:12px;">💸 Вывести 100 ⭐</button>
            <div id="withdrawTimer" style="text-align:center; margin-top:10px;"></div>
        </div>
    </div>

    <div class="container">
        <h2>❌ Крестики-Нолики ⭕</h2>
        <div id="status">Твой ход (X)</div>
        <div class="board" id="board"></div>
        <button onclick="resetGame()">🔄 Новая игра</button>
    </div>

    <script>
        // Создание звезд
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // Данные
        let currentUser = null;
        let stars = 0;
        let matchHistory = [];
        let withdrawHistory = [];
        let withdrawEndTime = null;
        let stats = { wins: 0, losses: 0, draws: 0 };
        let board = ["", "", "", "", "", "", "", "", ""];
        let gameOver = false;

        // Загрузка при старте
        window.onload = function () {
            let savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = savedUser;
                loadUserData();
                document.getElementById('welcomeOverlay').style.display = 'none';
            }
            createBoard();
            updateLeaderboard();
        };

        // Загрузка данных пользователя
        function loadUserData() {
            let savedStars = localStorage.getItem(currentUser + '_stars');
            let savedHistory = localStorage.getItem(currentUser + '_history');
            let savedWithdrawHistory = localStorage.getItem(currentUser + '_withdraw');
            let savedWithdrawTime = localStorage.getItem(currentUser + '_withdrawTime');
            let savedStats = localStorage.getItem(currentUser + '_stats');

            stars = savedStars ? parseInt(savedStars) : 0;
            matchHistory = savedHistory ? JSON.parse(savedHistory) : ['Добро пожаловать!'];
            withdrawHistory = savedWithdrawHistory ? JSON.parse(savedWithdrawHistory) : [];
            withdrawEndTime = savedWithdrawTime ? parseInt(savedWithdrawTime) : null;
            stats = savedStats ? JSON.parse(savedStats) : { wins: 0, losses: 0, draws: 0 };

            document.getElementById('userDisplay').innerText = '👤 ' + currentUser;
            document.getElementById('profileUsername').innerText = currentUser;
            updateUI();
            checkTimer();
        }

        // Сохранение данных пользователя
        function saveUserData() {
            if (!currentUser) return;
            localStorage.setItem('currentUser', currentUser);
            localStorage.setItem(currentUser + '_stars', stars);
            localStorage.setItem(currentUser + '_history', JSON.stringify(matchHistory));
            localStorage.setItem(currentUser + '_withdraw', JSON.stringify(withdrawHistory));
            if (withdrawEndTime) {
                localStorage.setItem(currentUser + '_withdrawTime', withdrawEndTime);
            }
            localStorage.setItem(currentUser + '_stats', JSON.stringify(stats));
            updateLeaderboard();
        }

        // Проверка пароля
        function validatePassword(password) {
            return /^\d{4}$/.test(password);
        }

        // Регистрация
        function handleRegister() {
            let username = document.getElementById('loginUsername').value.trim();
            let password = document.getElementById('loginPassword').value.trim();
            let errorDiv = document.getElementById('authError');

            if (!username || !password) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'Заполните все поля!';
                return;
            }

            if (!validatePassword(password)) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'Пароль должен быть 4 цифры!';
                return;
            }

            if (!username.startsWith('@')) {
                username = '@' + username;
            }

            let existingPass = localStorage.getItem('pass_' + username);
            if (existingPass) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'Такой пользователь уже существует!';
                return;
            }

            localStorage.setItem('pass_' + username, password);
            currentUser = username;
            stars = 0;
            stats = { wins: 0, losses: 0, draws: 0 };
            matchHistory = ['🎉 Аккаунт создан'];
            withdrawHistory = [];
            withdrawEndTime = null;

            saveUserData();
            document.getElementById('welcomeOverlay').style.display = 'none';
            errorDiv.style.display = 'none';
            document.getElementById('userDisplay').innerText = '👤 ' + currentUser;
            document.getElementById('profileUsername').innerText = currentUser;
            updateUI();
            updateLeaderboard();
        }

        // Вход
        function handleLogin() {
            let username = document.getElementById('loginUsername').value.trim();
            let password = document.getElementById('loginPassword').value.trim();
            let errorDiv = document.getElementById('authError');

            if (!username || !password) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'Заполните все поля!';
                return;
            }

            if (!username.startsWith('@')) {
                username = '@' + username;
            }

            let savedPass = localStorage.getItem('pass_' + username);
            if (savedPass === password) {
                currentUser = username;
                loadUserData();
                document.getElementById('welcomeOverlay').style.display = 'none';
                errorDiv.style.display = 'none';
                document.getElementById('userDisplay').innerText = '👤 ' + currentUser;
                document.getElementById('profileUsername').innerText = currentUser;
                updateLeaderboard();
            } else {
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'Неверный username или пароль!';
            }
        }

        // Выход
        function logout() {
            currentUser = null;
            document.getElementById('welcomeOverlay').style.display = 'flex';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            resetGame();
            updateLeaderboard();
        }

        // Обновление таблицы лидеров
        function updateLeaderboard() {
            let leaderboard = [];
            for (let i = 0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                if (key.endsWith('_stars')) {
                    let username = key.replace('_stars', '');
                    let userStars = parseInt(localStorage.getItem(key)) || 0;
                    leaderboard.push({ name: username, stars: userStars });
                }
            }

            leaderboard.sort((a, b) => b.stars - a.stars);

            let list = document.getElementById('leaderboardList');
            list.innerHTML = '';

            leaderboard.forEach((player, index) => {
                let div = document.createElement('div');
                div.className = 'leaderboard-item';

                if (index === 0) div.classList.add('top-1');
                if (index === 1) div.classList.add('top-2');
                if (index === 2) div.classList.add('top-3');
                if (player.name === currentUser) div.classList.add('current-user');

                div.innerHTML = `
                        <div class="rank">#${index + 1}</div>
                        <div class="player-name">${player.name}</div>
                        <div class="player-score">${player.stars}</div>
                    `;

                list.appendChild(div);
            });

            document.getElementById('leaderboardCount').innerText = `Всего игроков: ${leaderboard.length}`;

            if (currentUser) {
                let rank = leaderboard.findIndex(p => p.name === currentUser) + 1;
                document.getElementById('playerRank').innerText = rank ? `#${rank}` : '-';
            }
        }

        // Обновление UI
        function updateUI() {
            document.getElementById('starsDisplay').innerText = '⭐ ' + stars;
            document.getElementById('modalStars').innerText = stars + ' ⭐';
            document.getElementById('totalWins').innerText = stats.wins;
            document.getElementById('totalLosses').innerText = stats.losses;
            document.getElementById('totalDraws').innerText = stats.draws;

            let mh = document.getElementById('matchHistory');
            mh.innerHTML = '';
            matchHistory.slice(-10).reverse().forEach(m => {
                let div = document.createElement('div');
                div.className = 'historyItem';
                if (m.includes('Победа')) div.style.borderLeftColor = '#4caf50';
                if (m.includes('Поражение')) div.style.borderLeftColor = '#f44336';
                if (m.includes('Ничья')) div.style.borderLeftColor = '#ff9800';
                div.innerText = m;
                mh.appendChild(div);
            });
        }

        // Игра
        function createBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            board.forEach((cell, i) => {
                let div = document.createElement('div');
                div.className = 'cell';
                div.innerText = cell;
                div.onclick = () => playerMove(i);
                boardEl.appendChild(div);
            });
        }

        function playerMove(i) {
            if (board[i] !== '' || gameOver || !currentUser) return;

            board[i] = 'X';
            createBoard();

            if (checkWin('X')) {
                stars += 15;
                stats.wins++;
                endGame('Победа');
                return;
            }
            if (isDraw()) {
                stats.draws++;
                endGame('Ничья');
                return;
            }
            setTimeout(aiMove, 300);
        }

        function aiMove() {
            let empty = [];
            for (let i = 0; i < 9; i++) {
                if (board[i] === '') empty.push(i);
            }

            if (empty.length === 0) return;

            if (Math.random() < 0.3) {
                let move = empty[Math.floor(Math.random() * empty.length)];
                board[move] = 'O';
                createBoard();
                if (checkWin('O')) {
                    stats.losses++;
                    endGame('Поражение');
                }
                return;
            }

            for (let move of empty) {
                board[move] = 'O';
                if (checkWin('O')) {
                    createBoard();
                    stats.losses++;
                    endGame('Поражение');
                    return;
                }
                board[move] = '';
            }

            for (let move of empty) {
                board[move] = 'X';
                if (checkWin('X')) {
                    board[move] = 'O';
                    createBoard();
                    stats.losses++;
                    endGame('Поражение');
                    return;
                }
                board[move] = '';
            }

            let priority = [4, 0, 2, 6, 8, 1, 3, 5, 7];
            for (let move of priority) {
                if (board[move] === '') {
                    board[move] = 'O';
                    createBoard();
                    if (checkWin('O')) {
                        stats.losses++;
                        endGame('Поражение');
                    }
                    return;
                }
            }
        }

        function checkWin(p) {
            const wins = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];
            return wins.some(combo => combo.every(i => board[i] === p));
        }

        function isDraw() {
            return board.every(c => c !== '');
        }

        function endGame(result) {
            gameOver = true;
            document.getElementById('status').innerText = result;
            matchHistory.push(result + ' - ' + new Date().toLocaleString());
            saveUserData();
            updateUI();
        }

        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            gameOver = false;
            document.getElementById('status').innerText = 'Твой ход (X)';
            createBoard();
        }

        // Профиль
        function openProfile() {
            if (currentUser) {
                document.getElementById('profileModal').style.display = 'flex';
            }
        }

        function closeProfile() {
            document.getElementById('profileModal').style.display = 'none';
        }

        // Вывод средств
        function withdraw() {
            if (!currentUser) return;
            if (stars < 100) {
                alert('❌ Недостаточно ⭐');
                return;
            }
            if (withdrawEndTime && withdrawEndTime > Date.now()) {
                alert('❌ Вывод уже запрошен!');
                return;
            }

            stars -= 100;
            withdrawEndTime = Date.now() + 3 * 60 * 60 * 1000;
            withdrawHistory.push('💸 Запрос 100 ⭐ - ' + new Date().toLocaleString());
            saveUserData();
            updateUI();
            checkTimer();
        }

        function checkTimer() {
            if (!withdrawEndTime) return;

            const timerEl = document.getElementById('withdrawTimer');
            const btn = document.getElementById('withdrawBtn');

            function update() {
                let diff = withdrawEndTime - Date.now();
                if (diff <= 0) {
                    withdrawEndTime = null;
                    timerEl.innerText = '✅ Вывод доступен!';
                    btn.disabled = false;
                    saveUserData();
                    return;
                }
                btn.disabled = true;
                let h = Math.floor(diff / 1000 / 60 / 60);
                let m = Math.floor((diff / 1000 / 60) % 60);
                let s = Math.floor((diff / 1000) % 60);
                timerEl.innerText = '⏳ Ожидание: ' + h + 'ч ' + m + 'м ' + s + 'с';
                setTimeout(update, 1000);
            }
            update();
        }
    </script>
</body>
</html>
