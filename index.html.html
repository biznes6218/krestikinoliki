<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe Stars PRO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0f0f;
            position: relative;
            overflow: hidden;
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.2;
            }

            50% {
                opacity: 1;
            }
        }

        #profileBox {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(28, 28, 28, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 100;
            border: 1px solid #4a90e2;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #userDisplay {
            font-weight: bold;
            background: #4a90e2;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 14px;
        }

        #starsDisplay {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 16px;
        }

        #menuButtons {
            position: absolute;
            top: 20px;
            right: 280px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .menu-btn {
            padding: 10px 18px;
            background: rgba(51, 51, 51, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

            .menu-btn:hover {
                background: #4a90e2;
            }

            .menu-btn#logoutBtn {
                background: rgba(139, 0, 0, 0.9);
            }

        #leaderboardBox {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            background: rgba(28, 28, 28, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #4a90e2;
            z-index: 90;
            max-height: 80vh;
            overflow-y: auto;
        }

            #leaderboardBox h3 {
                margin-bottom: 20px;
                color: #4a90e2;
                border-bottom: 1px solid #333;
                padding-bottom: 10px;
            }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            margin: 5px 0;
            background: rgba(17, 17, 17, 0.8);
            border-radius: 10px;
        }

            .leaderboard-item.top-1 {
                background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05));
                border: 1px solid gold;
            }

            .leaderboard-item.top-2 {
                background: linear-gradient(135deg, rgba(192,192,192,0.2), rgba(192,192,192,0.05));
                border: 1px solid silver;
            }

            .leaderboard-item.top-3 {
                background: linear-gradient(135deg, rgba(205,127,50,0.2), rgba(205,127,50,0.05));
                border: 1px solid #cd7f32;
            }

            .leaderboard-item.current-user {
                border: 2px solid #4a90e2;
            }

        .rank {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #333;
            border-radius: 50%;
            font-weight: bold;
            font-size: 12px;
        }

        .player-name {
            flex: 1;
            font-weight: bold;
            font-size: 14px;
        }

        .player-score {
            font-weight: bold;
            color: #4a90e2;
            font-size: 16px;
        }

        .leaderboard-count {
            text-align: center;
            margin-top: 15px;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-size: 12px;
            color: #aaa;
        }

        #matchHistoryBox {
            position: absolute;
            left: 350px;
            top: 50%;
            transform: translateY(-50%);
            width: 240px;
            background: rgba(28, 28, 28, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #4a90e2;
            max-height: 70vh;
            overflow-y: auto;
        }

            #matchHistoryBox h3 {
                margin-bottom: 20px;
                color: #4a90e2;
                border-bottom: 1px solid #333;
                padding-bottom: 10px;
            }

        .historyItem {
            background: rgba(17, 17, 17, 0.8);
            padding: 8px;
            margin: 5px 0;
            border-radius: 8px;
            font-size: 12px;
            border-left: 3px solid;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid #4a90e2;
        }

            .container h2 {
                font-size: 28px;
                margin-bottom: 15px;
                background: linear-gradient(135deg, #fff, #4a90e2);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

        #status {
            font-size: 18px;
            margin-bottom: 15px;
            color: #4a90e2;
        }

        .board {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(3,100px);
            grid-template-rows: repeat(3,100px);
            gap: 8px;
        }

        .cell {
            background: rgba(30, 30, 30, 0.9);
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 15px;
            height: 100px;
            width: 100px;
            border: 2px solid transparent;
        }

            .cell:hover {
                border-color: #4a90e2;
            }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #333, #444);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 50px;
            font-size: 16px;
            transition: 0.3s;
        }

            button:hover {
                background: #4a90e2;
            }

        #welcomeOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #welcomeBox {
            background: rgba(28, 28, 28, 0.98);
            padding: 50px;
            border-radius: 30px;
            width: 420px;
            text-align: center;
            border: 2px solid #4a90e2;
        }

            #welcomeBox h2 {
                margin-bottom: 20px;
                color: #4a90e2;
            }

            #welcomeBox input {
                width: 100%;
                padding: 15px;
                margin: 10px 0;
                background: rgba(51, 51, 51, 0.9);
                border: 2px solid #4a90e2;
                color: white;
                border-radius: 50px;
                font-size: 16px;
            }

            #welcomeBox button {
                width: 100%;
                padding: 15px;
                margin: 8px 0;
                font-size: 16px;
            }

        #registerBtn {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modalContent {
            background: rgba(28, 28, 28, 0.98);
            padding: 30px;
            border-radius: 25px;
            width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            border: 2px solid #4a90e2;
        }

        .closeBtn {
            float: right;
            cursor: pointer;
            font-size: 24px;
        }

        .stats {
            background: rgba(17, 17, 17, 0.9);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .statItem {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            padding: 8px;
            background: rgba(26, 26, 26, 0.9);
            border-radius: 5px;
        }

        .shopCategory {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

            .shopCategory button {
                flex: 1;
                margin-top: 0;
            }

                .shopCategory button.active {
                    background: #4a90e2;
                }

        .shopItem {
            background: rgba(17, 17, 17, 0.9);
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .shopPreview {
            height: 60px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            background: #1e1e1e;
        }

        .item-rarity {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 10px;
        }

        .rarity-common {
            background: #808080;
        }

        .rarity-rare {
            background: #4a90e2;
        }

        .rarity-epic {
            background: #9b59b6;
        }
    </style>
</head>
<body>

    <div class="stars" id="stars"></div>

    <div id="welcomeOverlay">
        <div id="welcomeBox">
            <h2>🎮 Tic Tac Toe Stars</h2>
            <p>Введите данные для входа</p>
            <input type="text" id="loginUsername" placeholder="@username" value="">
            <input type="password" id="loginPassword" placeholder="4-значный пароль" maxlength="4">
            <div id="authError" style="color: #ff6b6b; display: none;"></div>
            <button onclick="handleLogin()">🔑 Войти</button>
            <button id="registerBtn" onclick="handleRegister()">✨ Зарегистрироваться</button>
        </div>
    </div>

    <div id="menuButtons">
        <button class="menu-btn" id="shopBtn" onclick="openShop()">🛒 Магазин</button>
        <button class="menu-btn" id="logoutBtn" onclick="logout()">🚪 Выйти</button>
    </div>

    <div id="profileBox" onclick="openProfile()">
        <div id="userDisplay">👤 Загрузка...</div>
        <div id="starsDisplay">⭐ 0</div>
    </div>

    <div id="leaderboardBox">
        <h3>🏆 Топ игроков МИРА</h3>
        <div id="leaderboardList"></div>
        <div class="leaderboard-count" id="leaderboardCount">Загрузка...</div>
    </div>

    <div id="matchHistoryBox">
        <h3>📊 Последние матчи</h3>
        <div id="matchHistory"></div>
    </div>

    <div id="profileModal" class="modal">
        <div class="modalContent">
            <div class="closeBtn" onclick="closeProfile()">✖</div>
            <h2>👤 Профиль</h2>
            <div class="stats">
                <div class="statItem"><span>Username:</span> <span id="profileUsername"></span></div>
                <div class="statItem"><span>Баланс:</span> <span id="modalStars">0 ⭐</span></div>
                <div class="statItem"><span>Побед:</span> <span id="totalWins">0</span></div>
                <div class="statItem"><span>Поражений:</span> <span id="totalLosses">0</span></div>
                <div class="statItem"><span>Ничьих:</span> <span id="totalDraws">0</span></div>
                <div class="statItem"><span>Место в мире:</span> <span id="playerRank">-</span></div>
            </div>
            <h3>📜 История выводов</h3>
            <div id="withdrawHistory"></div>
            <button onclick="withdraw()" id="withdrawBtn" style="width:100%; margin-top:10px;">💸 Вывести 100 ⭐</button>
            <div id="withdrawTimer" style="text-align:center; margin-top:10px;"></div>
        </div>
    </div>

    <div id="shopModal" class="modal">
        <div class="modalContent">
            <div class="closeBtn" onclick="closeShop()">✖</div>
            <h2>🛍️ Магазин</h2>
            <div class="shopCategory">
                <button onclick="showCategory('background')" id="catBackground">Фоны</button>
                <button onclick="showCategory('xskin')" id="catXskin">Скины X</button>
            </div>
            <div id="shopItems"></div>
        </div>
    </div>

    <div class="container">
        <h2>❌ Крестики-Нолики ⭕</h2>
        <div id="status">Твой ход (X)</div>
        <div class="board" id="board"></div>
        <button onclick="resetGame()">🔄 Новая игра</button>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // ВАША КОНФИГУРАЦИЯ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDbSTut78ZanBoS3tdR3G86-t6mf9jmVdU",
            authDomain: "krestiki-a8220.firebaseapp.com",
            databaseURL: "https://krestiki-a8220-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "krestiki-a8220",
            storageBucket: "krestiki-a8220.firebasestorage.app",
            messagingSenderId: "850500600152",
            appId: "1:850500600152:web:1d21035c9f5d6be89da52d",
            measurementId: "G-567L2T8WCZ"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Создание звезд
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // Данные
        let currentUser = null;
        let stars = 0;
        let matchHistory = [];
        let withdrawHistory = [];
        let withdrawEndTime = null;
        let ownedItems = ["default_bg", "default_x"];
        let equipped = {
            background: "default_bg",
            xskin: "default_x"
        };
        let stats = { wins: 0, losses: 0, draws: 0 };
        let board = ["", "", "", "", "", "", "", "", ""];
        let gameOver = false;

        // Товары в магазине
        const shopItems = [
            { id: "default_bg", name: "Стандарт", category: "background", price: 0, rarity: "common", style: "#0f0f0f" },
            { id: "sunset_bg", name: "Закат", category: "background", price: 50, rarity: "common", style: "linear-gradient(135deg,#ff512f,#dd2476)" },
            { id: "ocean_bg", name: "Океан", category: "background", price: 80, rarity: "common", style: "linear-gradient(135deg,#2193b0,#6dd5ed)" },
            { id: "neon_bg", name: "Неон", category: "background", price: 120, rarity: "rare", style: "linear-gradient(135deg,#0f0c29,#302b63,#24243e)" },
            { id: "galaxy_bg", name: "Галактика", category: "background", price: 150, rarity: "rare", style: "radial-gradient(circle,#1e3c72,#2a5298,#000)" },
            { id: "lava_bg", name: "Лава", category: "background", price: 200, rarity: "epic", style: "linear-gradient(135deg,#f12711,#f5af19)" },
            { id: "default_x", name: "Классический X", category: "xskin", price: 0, rarity: "common", symbol: "❌" },
            { id: "skull_x", name: "Череп", category: "xskin", price: 100, rarity: "common", symbol: "💀" },
            { id: "sword_x", name: "Меч", category: "xskin", price: 150, rarity: "rare", symbol: "⚔️" },
            { id: "crown_x", name: "Корона", category: "xskin", price: 200, rarity: "rare", symbol: "👑" },
            { id: "dragon_x", name: "Дракон", category: "xskin", price: 250, rarity: "epic", symbol: "🐉" },
            { id: "fire_x", name: "Огонь", category: "xskin", price: 300, rarity: "epic", symbol: "🔥" }
        ];

        // Загрузка при старте
        window.onload = function () {
            let savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = savedUser;
                loadUserData();
                document.getElementById('welcomeOverlay').style.display = 'none';
            }
            createBoard();
            loadGlobalLeaderboard();
        };

        // Загрузка данных пользователя
        function loadUserData() {
            let savedStars = localStorage.getItem(currentUser + '_stars');
            let savedHistory = localStorage.getItem(currentUser + '_history');
            let savedWithdrawHistory = localStorage.getItem(currentUser + '_withdraw');
            let savedWithdrawTime = localStorage.getItem(currentUser + '_withdrawTime');
            let savedStats = localStorage.getItem(currentUser + '_stats');
            let savedOwned = localStorage.getItem(currentUser + '_owned');
            let savedEquipped = localStorage.getItem(currentUser + '_equipped');

            stars = savedStars ? parseInt(savedStars) : 0;
            matchHistory = savedHistory ? JSON.parse(savedHistory) : ['Добро пожаловать!'];
            withdrawHistory = savedWithdrawHistory ? JSON.parse(savedWithdrawHistory) : [];
            withdrawEndTime = savedWithdrawTime ? parseInt(savedWithdrawTime) : null;
            stats = savedStats ? JSON.parse(savedStats) : { wins: 0, losses: 0, draws: 0 };
            ownedItems = savedOwned ? JSON.parse(savedOwned) : ["default_bg", "default_x"];
            equipped = savedEquipped ? JSON.parse(savedEquipped) : { background: "default_bg", xskin: "default_x" };

            document.getElementById('userDisplay').innerText = '👤 ' + currentUser;
            document.getElementById('profileUsername').innerText = currentUser;
            applyBackground();
            updateUI();
            checkTimer();
        }

        // Сохранение данных пользователя
        function saveUserData() {
            if (!currentUser) return;
            localStorage.setItem('currentUser', currentUser);
            localStorage.setItem(currentUser + '_stars', stars);
            localStorage.setItem(currentUser + '_history', JSON.stringify(matchHistory));
            localStorage.setItem(currentUser + '_withdraw', JSON.stringify(withdrawHistory));
            if (withdrawEndTime) {
                localStorage.setItem(currentUser + '_withdrawTime', withdrawEndTime);
            }
            localStorage.setItem(currentUser + '_stats', JSON.stringify(stats));
            localStorage.setItem(currentUser + '_owned', JSON.stringify(ownedItems));
            localStorage.setItem(currentUser + '_equipped', JSON.stringify(equipped));

            // Сохраняем в Firebase
            saveToFirebase();
        }

        // ===== FIREBASE: ОБЩАЯ ТАБЛИЦА ЛИДЕРОВ =====
        function saveToFirebase() {
            if (!currentUser) return;

            database.ref('players/' + currentUser.replace('@', '')).set({
                username: currentUser,
                stars: stars,
                wins: stats.wins
            });
        }

        function loadGlobalLeaderboard() {
            const playersRef = database.ref('players');

            playersRef.on('value', (snapshot) => {
                const data = snapshot.val();
                const players = [];

                for (let id in data) {
                    players.push(data[id]);
                }

                players.sort((a, b) => b.stars - a.stars);
                displayLeaderboard(players);

                if (currentUser) {
                    let rank = players.findIndex(p => p.username === currentUser) + 1;
                    document.getElementById('playerRank').innerText = rank ? `#${rank}` : '-';
                }
            });
        }

        function displayLeaderboard(players) {
            const list = document.getElementById('leaderboardList');
            list.innerHTML = '';

            players.slice(0, 50).forEach((player, index) => {
                const div = document.createElement('div');
                div.className = 'leaderboard-item';

                if (index === 0) div.classList.add('top-1');
                if (index === 1) div.classList.add('top-2');
                if (index === 2) div.classList.add('top-3');
                if (player.username === currentUser) div.classList.add('current-user');

                div.innerHTML = `
                        <div class="rank">#${index + 1}</div>
                        <div class="player-name">${player.username}</div>
                        <div class="player-score">${player.stars}</div>
                    `;

                list.appendChild(div);
            });

            document.getElementById('leaderboardCount').innerText = `Всего игроков: ${players.length}`;
        }

        // Регистрация
        function handleRegister() {
            let username = document.getElementById('loginUsername').value.trim();
            let password = document.getElementById('loginPassword').value.trim();
            let errorDiv = document.getElementById('authError');

            if (!username || !password) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'Заполните все поля!';
                return;
            }

            if (password.length !== 4 || isNaN(password)) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'Пароль должен быть 4 цифры!';
                return;
            }

            if (!username.startsWith('@')) {
                username = '@' + username;
            }

            let existingPass = localStorage.getItem('pass_' + username);
            if (existingPass) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'Такой пользователь уже существует!';
                return;
            }

            localStorage.setItem('pass_' + username, password);
            currentUser = username;
            stars = 0;
            stats = { wins: 0, losses: 0, draws: 0 };
            matchHistory = ['🎉 Аккаунт создан'];
            withdrawHistory = [];
            withdrawEndTime = null;
            ownedItems = ["default_bg", "default_x"];
            equipped = { background: "default_bg", xskin: "default_x" };

            saveUserData();
            document.getElementById('welcomeOverlay').style.display = 'none';
            errorDiv.style.display = 'none';
            document.getElementById('userDisplay').innerText = '👤 ' + currentUser;
            document.getElementById('profileUsername').innerText = currentUser;
            applyBackground();
            updateUI();
        }

        // Вход
        function handleLogin() {
            let username = document.getElementById('loginUsername').value.trim();
            let password = document.getElementById('loginPassword').value.trim();
            let errorDiv = document.getElementById('authError');

            if (!username || !password) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'Заполните все поля!';
                return;
            }

            if (!username.startsWith('@')) {
                username = '@' + username;
            }

            let savedPass = localStorage.getItem('pass_' + username);
            if (savedPass === password) {
                currentUser = username;
                loadUserData();
                document.getElementById('welcomeOverlay').style.display = 'none';
                errorDiv.style.display = 'none';
                document.getElementById('userDisplay').innerText = '👤 ' + currentUser;
                document.getElementById('profileUsername').innerText = currentUser;
            } else {
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'Неверный username или пароль!';
            }
        }

        // Выход
        function logout() {
            currentUser = null;
            document.getElementById('welcomeOverlay').style.display = 'flex';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            resetGame();
        }

        // Магазин
        let currentCategory = 'background';

        function openShop() {
            document.getElementById('shopModal').style.display = 'flex';
            showCategory('background');
        }

        function closeShop() {
            document.getElementById('shopModal').style.display = 'none';
        }

        function showCategory(category) {
            currentCategory = category;
            document.getElementById('catBackground').className = '';
            document.getElementById('catXskin').className = '';
            document.getElementById('cat' + category.charAt(0).toUpperCase() + category.slice(1)).className = 'active';
            renderShop();
        }

        function renderShop() {
            let container = document.getElementById('shopItems');
            container.innerHTML = '';

            let filtered = shopItems.filter(item => item.category === currentCategory);

            filtered.forEach(item => {
                let div = document.createElement('div');
                div.className = 'shopItem';

                let rarityClass = 'rarity-' + item.rarity;

                if (item.category === 'background') {
                    div.innerHTML = `
                            <div class="shopPreview" style="background:${item.style}"></div>
                            <strong>${item.name}</strong>
                            <span class="item-rarity ${rarityClass}">${item.rarity}</span><br>
                            Цена: ${item.price} ⭐<br>
                        `;
                } else {
                    div.innerHTML = `
                            <div class="shopPreview">${item.symbol}</div>
                            <strong>${item.name}</strong>
                            <span class="item-rarity ${rarityClass}">${item.rarity}</span><br>
                            Цена: ${item.price} ⭐<br>
                        `;
                }

                let btn = document.createElement('button');

                if (ownedItems.includes(item.id)) {
                    if (equipped[item.category] === item.id) {
                        btn.innerText = '✅ Экипировано';
                        btn.disabled = true;
                    } else {
                        btn.innerText = '📦 Экипировать';
                        btn.onclick = () => equipItem(item);
                    }
                } else {
                    btn.innerText = '💎 Купить';
                    btn.onclick = () => buyItem(item);
                }

                div.appendChild(btn);
                container.appendChild(div);
            });
        }

        function buyItem(item) {
            if (stars < item.price) {
                alert('❌ Недостаточно ⭐');
                return;
            }

            stars -= item.price;
            ownedItems.push(item.id);
            saveUserData();
            renderShop();
            updateUI();
            alert(`✅ Куплено: ${item.name}`);
        }

        function equipItem(item) {
            equipped[item.category] = item.id;

            if (item.category === 'background') {
                applyBackground();
            } else {
                createBoard();
            }

            saveUserData();
            renderShop();
        }

        function applyBackground() {
            let bg = shopItems.find(i => i.id === equipped.background);
            if (bg) {
                document.body.style.background = bg.style;
            }
        }

        // Игра
        function getSymbol() {
            let xskin = shopItems.find(i => i.id === equipped.xskin);
            return xskin ? xskin.symbol : '❌';
        }

        function createBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            board.forEach((cell, i) => {
                let div = document.createElement('div');
                div.className = 'cell';
                if (cell === 'X') {
                    div.innerText = getSymbol();
                } else if (cell === 'O') {
                    div.innerText = '⭕';
                } else {
                    div.innerText = '';
                }
                div.onclick = () => playerMove(i);
                boardEl.appendChild(div);
            });
        }

        function playerMove(i) {
            if (board[i] !== '' || gameOver || !currentUser) return;

            board[i] = 'X';
            createBoard();

            if (checkWin('X')) {
                stars += 15;
                stats.wins++;
                endGame('Победа');
                return;
            }
            if (isDraw()) {
                stats.draws++;
                endGame('Ничья');
                return;
            }
            setTimeout(aiMove, 300);
        }

        function aiMove() {
            let empty = [];
            for (let i = 0; i < 9; i++) {
                if (board[i] === '') empty.push(i);
            }

            if (empty.length === 0) return;

            if (Math.random() < 0.3) {
                let move = empty[Math.floor(Math.random() * empty.length)];
                board[move] = 'O';
                createBoard();
                if (checkWin('O')) {
                    stats.losses++;
                    endGame('Поражение');
                }
                return;
            }

            for (let move of empty) {
                board[move] = 'O';
                if (checkWin('O')) {
                    createBoard();
                    stats.losses++;
                    endGame('Поражение');
                    return;
                }
                board[move] = '';
            }

            for (let move of empty) {
                board[move] = 'X';
                if (checkWin('X')) {
                    board[move] = 'O';
                    createBoard();
                    stats.losses++;
                    endGame('Поражение');
                    return;
                }
                board[move] = '';
            }

            let priority = [4, 0, 2, 6, 8, 1, 3, 5, 7];
            for (let move of priority) {
                if (board[move] === '') {
                    board[move] = 'O';
                    createBoard();
                    if (checkWin('O')) {
                        stats.losses++;
                        endGame('Поражение');
                    }
                    return;
                }
            }
        }

        function checkWin(p) {
            const wins = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];
            return wins.some(combo => combo.every(i => board[i] === p));
        }

        function isDraw() {
            return board.every(c => c !== '');
        }

        function endGame(result) {
            gameOver = true;
            document.getElementById('status').innerText = result;
            matchHistory.push(result + ' - ' + new Date().toLocaleString());
            saveUserData();
            updateUI();
        }

        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            gameOver = false;
            document.getElementById('status').innerText = 'Твой ход (X)';
            createBoard();
        }

        // Профиль
        function openProfile() {
            if (currentUser) {
                document.getElementById('profileModal').style.display = 'flex';
                let wh = document.getElementById('withdrawHistory');
                wh.innerHTML = '';
                withdrawHistory.slice(-5).reverse().forEach(w => {
                    let div = document.createElement('div');
                    div.className = 'historyItem';
                    div.innerText = w;
                    wh.appendChild(div);
                });
            }
        }

        function closeProfile() {
            document.getElementById('profileModal').style.display = 'none';
        }

        // Обновление UI
        function updateUI() {
            document.getElementById('starsDisplay').innerText = '⭐ ' + stars;
            document.getElementById('modalStars').innerText = stars + ' ⭐';
            document.getElementById('totalWins').innerText = stats.wins;
            document.getElementById('totalLosses').innerText = stats.losses;
            document.getElementById('totalDraws').innerText = stats.draws;

            let mh = document.getElementById('matchHistory');
            mh.innerHTML = '';
            matchHistory.slice(-10).reverse().forEach(m => {
                let div = document.createElement('div');
                div.className = 'historyItem';
                if (m.includes('Победа')) div.style.borderLeftColor = '#4caf50';
                if (m.includes('Поражение')) div.style.borderLeftColor = '#f44336';
                if (m.includes('Ничья')) div.style.borderLeftColor = '#ff9800';
                div.innerText = m;
                mh.appendChild(div);
            });
        }

        // Вывод средств
        function withdraw() {
            if (!currentUser) return;
            if (stars < 100) {
                alert('❌ Недостаточно ⭐');
                return;
            }
            if (withdrawEndTime && withdrawEndTime > Date.now()) {
                alert('❌ Вывод уже запрошен!');
                return;
            }

            stars -= 100;
            withdrawEndTime = Date.now() + 3 * 60 * 60 * 1000;
            withdrawHistory.push('💸 Запрос 100 ⭐ - ' + new Date().toLocaleString());
            saveUserData();
            updateUI();
            checkTimer();

            let wh = document.getElementById('withdrawHistory');
            wh.innerHTML = '';
            withdrawHistory.slice(-5).reverse().forEach(w => {
                let div = document.createElement('div');
                div.className = 'historyItem';
                div.innerText = w;
                wh.appendChild(div);
            });
        }

        function checkTimer() {
            if (!withdrawEndTime) return;

            const timerEl = document.getElementById('withdrawTimer');
            const btn = document.getElementById('withdrawBtn');

            function update() {
                let diff = withdrawEndTime - Date.now();
                if (diff <= 0) {
                    withdrawEndTime = null;
                    timerEl.innerText = '';
                    btn.disabled = false;
                    saveUserData();
                    return;
                }
                btn.disabled = true;
                let h = Math.floor(diff / 1000 / 60 / 60);
                let m = Math.floor((diff / 1000 / 60) % 60);
                let s = Math.floor((diff / 1000) % 60);
                timerEl.innerText = '⏳ Ожидание: ' + h + 'ч ' + m + 'м ' + s + 'с';
                setTimeout(update, 1000);
            }
            update();
        }
    </script>
</body>
</html>
