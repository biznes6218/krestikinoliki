<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe Stars PRO</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.6s ease;
            background: #0f0f0f;
            position: relative;
            overflow: hidden;
        }

        /* Фоновые звезды */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.2;
            }

            50% {
                opacity: 1;
            }
        }

        /* ===== ПРОФИЛЬ ===== */
        #profileBox {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(28, 28, 28, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 100;
            border: 1px solid rgba(74, 144, 226, 0.5);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

            #profileBox:hover {
                border-color: #4a90e2;
                transform: translateY(-2px);
                box-shadow: 0 8px 25px rgba(74, 144, 226, 0.3);
            }

        #userDisplay {
            font-weight: bold;
            background: #4a90e2;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 14px;
        }

        #starsDisplay {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 16px;
        }

        /* ===== КНОПКИ МЕНЮ ===== */
        #menuButtons {
            position: absolute;
            top: 20px;
            right: 280px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .menu-btn {
            padding: 10px 18px;
            background: rgba(51, 51, 51, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

            .menu-btn:hover {
                background: #4a90e2;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(74, 144, 226, 0.4);
            }

            .menu-btn#logoutBtn {
                background: rgba(139, 0, 0, 0.9);
            }

                .menu-btn#logoutBtn:hover {
                    background: #a52a2a;
                }

        /* ===== ТАБЛИЦА ЛИДЕРОВ ===== */
        #leaderboardBox {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            background: rgba(28, 28, 28, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid rgba(74, 144, 226, 0.3);
            z-index: 90;
            max-height: 80vh;
            overflow-y: auto;
        }

            #leaderboardBox h3 {
                margin-bottom: 20px;
                color: #4a90e2;
                font-size: 20px;
                display: flex;
                align-items: center;
                gap: 10px;
                border-bottom: 1px solid #333;
                padding-bottom: 10px;
                position: sticky;
                top: 0;
                background: rgba(28, 28, 28, 0.95);
                z-index: 2;
            }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            margin: 5px 0;
            background: rgba(17, 17, 17, 0.8);
            border-radius: 10px;
            transition: 0.2s;
            border: 1px solid transparent;
        }

            .leaderboard-item:hover {
                border-color: #4a90e2;
                transform: translateX(3px);
            }

            .leaderboard-item.top-1 {
                background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05));
                border-color: gold;
            }

            .leaderboard-item.top-2 {
                background: linear-gradient(135deg, rgba(192,192,192,0.2), rgba(192,192,192,0.05));
                border-color: silver;
            }

            .leaderboard-item.top-3 {
                background: linear-gradient(135deg, rgba(205,127,50,0.2), rgba(205,127,50,0.05));
                border-color: #cd7f32;
            }

            .leaderboard-item.current-user {
                border: 2px solid #4a90e2;
                background: rgba(74, 144, 226, 0.15);
            }

        .rank {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #333;
            border-radius: 50%;
            font-weight: bold;
            font-size: 12px;
            flex-shrink: 0;
        }

        .top-1 .rank {
            background: gold;
            color: #000;
        }

        .top-2 .rank {
            background: silver;
            color: #000;
        }

        .top-3 .rank {
            background: #cd7f32;
            color: #000;
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-name {
            font-weight: bold;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-score {
            font-weight: bold;
            color: #4a90e2;
            font-size: 16px;
            flex-shrink: 0;
            min-width: 40px;
            text-align: right;
        }

        .leaderboard-count {
            text-align: center;
            margin-top: 15px;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-size: 12px;
            color: #aaa;
        }

        /* ===== ИСТОРИЯ ===== */
        #matchHistoryBox {
            position: absolute;
            left: 350px;
            top: 50%;
            transform: translateY(-50%);
            width: 240px;
            background: rgba(28, 28, 28, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid rgba(74, 144, 226, 0.3);
            max-height: 70vh;
            overflow-y: auto;
        }

            #matchHistoryBox h3 {
                margin-bottom: 20px;
                color: #4a90e2;
                font-size: 18px;
                display: flex;
                align-items: center;
                gap: 8px;
                border-bottom: 1px solid #333;
                padding-bottom: 10px;
            }

        .historyItem {
            background: rgba(17, 17, 17, 0.8);
            padding: 8px;
            margin: 5px 0;
            border-radius: 8px;
            font-size: 12px;
            border-left: 3px solid;
        }

            .historyItem.win {
                border-left-color: #4caf50;
            }

            .historyItem.loss {
                border-left-color: #f44336;
            }

            .historyItem.draw {
                border-left-color: #ff9800;
            }

        /* ===== ИГРА ===== */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid rgba(74, 144, 226, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

            .container h2 {
                font-size: 28px;
                margin-bottom: 15px;
                background: linear-gradient(135deg, #fff, #4a90e2);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

        #status {
            font-size: 18px;
            margin-bottom: 15px;
            color: #4a90e2;
            font-weight: bold;
        }

        .board {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(3,100px);
            grid-template-rows: repeat(3,100px);
            gap: 8px;
        }

        .cell {
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(5px);
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 15px;
            transition: 0.3s;
            height: 100px;
            width: 100px;
            border: 2px solid transparent;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

            .cell:hover {
                background: rgba(50, 50, 50, 0.9);
                border-color: #4a90e2;
                transform: scale(1.02);
            }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #333, #444);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

            button:hover {
                background: linear-gradient(135deg, #4a90e2, #357abd);
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(74, 144, 226, 0.3);
            }

        /* ===== МАГАЗИН ===== */
        .shopCategory {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

            .shopCategory button {
                flex: 1;
                min-width: 100px;
                margin-top: 0;
            }

                .shopCategory button.active {
                    background: #4a90e2;
                }

        .shopItem {
            background: rgba(17, 17, 17, 0.9);
            padding: 20px;
            margin: 15px 0;
            border-radius: 15px;
            border: 1px solid #333;
            transition: 0.3s;
        }

            .shopItem:hover {
                border-color: #4a90e2;
                transform: translateX(5px);
            }

        .shopPreview {
            height: 80px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            background: #1e1e1e;
        }

        .item-rarity {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 10px;
            font-weight: bold;
        }

        .rarity-common {
            background: #808080;
        }

        .rarity-rare {
            background: #4a90e2;
        }

        .rarity-epic {
            background: #9b59b6;
        }

        /* ===== ПРИВЕТСТВИЕ ===== */
        #welcomeOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #welcomeBox {
            background: rgba(28, 28, 28, 0.98);
            padding: 50px;
            border-radius: 30px;
            width: 420px;
            text-align: center;
            border: 2px solid #4a90e2;
            box-shadow: 0 30px 60px rgba(74, 144, 226, 0.3);
        }

            #welcomeBox h2 {
                font-size: 32px;
                margin-bottom: 20px;
                background: linear-gradient(135deg, #fff, #4a90e2);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            #welcomeBox input {
                width: 100%;
                padding: 15px;
                margin: 10px 0;
                background: rgba(51, 51, 51, 0.9);
                border: 2px solid #4a90e2;
                color: white;
                border-radius: 50px;
                font-size: 16px;
                box-sizing: border-box;
            }

        #loginPassword {
            font-size: 24px;
            letter-spacing: 8px;
            text-align: center;
        }

        #welcomeBox button {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            font-size: 16px;
            cursor: pointer;
        }

        #registerBtn {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }

        #authError {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        /* ===== МОДАЛКИ ===== */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modalContent {
            background: rgba(28, 28, 28, 0.98);
            backdrop-filter: blur(10px);
            width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 30px;
            border-radius: 25px;
            border: 2px solid #4a90e2;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .closeBtn {
            float: right;
            cursor: pointer;
            font-size: 24px;
            color: #999;
            transition: 0.2s;
        }

            .closeBtn:hover {
                color: white;
                transform: rotate(90deg);
            }

        /* ===== СТАТИСТИКА ===== */
        .stats {
            background: rgba(17, 17, 17, 0.9);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .statItem {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            padding: 8px;
            background: rgba(26, 26, 26, 0.9);
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <!-- Фоновые звезды -->
    <div class="stars" id="stars"></div>

    <div id="welcomeOverlay">
        <div id="welcomeBox">
            <h2>🎮 Tic Tac Toe Stars</h2>
            <p>Введите данные для входа</p>
            <input type="text" id="loginUsername" placeholder="@username" value="">
            <input type="password" id="loginPassword" placeholder="4-значный пароль" maxlength="4">
            <div id="authError"></div>
            <button onclick="handleLogin()">🔑 Войти</button>
            <button id="registerBtn" onclick="handleRegister()">✨ Зарегистрироваться</button>
        </div>
    </div>

    <div id="menuButtons">
        <button class="menu-btn" id="shopBtn" onclick="openShop()">🛒 Магазин</button>
        <button class="menu-btn" id="logoutBtn" onclick="logout()">🚪 Выйти</button>
    </div>

    <div id="profileBox" onclick="openProfile()">
        <div id="userDisplay">👤 Загрузка...</div>
        <div id="starsDisplay">⭐ 0</div>
    </div>

    <!-- Таблица лидеров -->
    <div id="leaderboardBox">
        <h3>🏆 Топ игроков МИРА</h3>
        <div id="leaderboardList"></div>
        <div class="leaderboard-count" id="leaderboardCount">Загрузка...</div>
    </div>

    <!-- История матчей -->
    <div id="matchHistoryBox">
        <h3>📊 Последние матчи</h3>
        <div id="matchHistory"></div>
    </div>

    <!-- Модалка профиля -->
    <div id="profileModal" class="modal">
        <div class="modalContent">
            <div class="closeBtn" onclick="closeProfile()">✖</div>
            <h2>👤 Профиль</h2>
            <div class="stats">
                <div class="statItem"><span>Username:</span> <span id="profileUsername"></span></div>
                <div class="statItem"><span>Баланс:</span> <span id="modalStars">0 ⭐</span></div>
                <div class="statItem"><span>Побед:</span> <span id="totalWins">0</span></div>
                <div class="statItem"><span>Поражений:</span> <span id="totalLosses">0</span></div>
                <div class="statItem"><span>Ничьих:</span> <span id="totalDraws">0</span></div>
                <div class="statItem"><span>Место в мире:</span> <span id="playerRank">-</span></div>
            </div>
        </div>
    </div>

    <!-- Модалка магазина -->
    <div id="shopModal" class="modal">
        <div class="modalContent">
            <div class="closeBtn" onclick="closeShop()">✖</div>
            <h2>🛍️ Магазин</h2>
            <div class="shopCategory">
                <button onclick="showCategory('background')" id="catBackground">Фоны</button>
                <button onclick="showCategory('xskin')" id="catXskin">Скины X</button>
            </div>
            <div id="shopItems"></div>
        </div>
    </div>

    <div class="container">
        <h2>❌ Крестики-Нолики ⭕</h2>
        <div id="status">Твой ход (X)</div>
        <div class="board" id="board"></div>
        <button onclick="resetGame()">🔄 Новая игра</button>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // ВАША КОНФИГУРАЦИЯ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDbSTut78ZanBoS3tdR3G86-t6mf9jmVdU",
            authDomain: "krestiki-a8220.firebaseapp.com",
            databaseURL: "https://krestiki-a8220-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "krestiki-a8220",
            storageBucket: "krestiki-a8220.firebasestorage.app",
            messagingSenderId: "850500600152",
            appId: "1:850500600152:web:1d21035c9f5d6be89da52d",
            measurementId: "G-567L2T8WCZ"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Создание звезд
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // Данные игры
        let currentUser = null;
        let stars = 0;
        let matchHistory = [];
        let withdrawHistory = [];
        let withdrawEndTime = null;
        let ownedItems = ["default_bg", "default_x"];
        let equipped = {
            background: "default_bg",
            xskin: "default_x"
        };
        let stats = {
            wins: 0,
            losses: 0,
            draws: 0
        };

        // Товары в магазине
        const shopItems = [
            { id: "default_bg", name: "Стандарт", category: "background", price: 0, rarity: "common", style: "#0f0f0f" },
            { id: "sunset_bg", name: "Закат", category: "background", price: 50, rarity: "common", style: "linear-gradient(135deg,#ff512f,#dd2476)" },
            { id: "ocean_bg", name: "Океан", category: "background", price: 80, rarity: "common", style: "linear-gradient(135deg,#2193b0,#6dd5ed)" },
            { id: "neon_bg", name: "Неон", category: "background", price: 120, rarity: "rare", style: "linear-gradient(135deg,#0f0c29,#302b63,#24243e)" },
            { id: "galaxy_bg", name: "Галактика", category: "background", price: 150, rarity: "rare", style: "radial-gradient(circle,#1e3c72,#2a5298,#000)" },
            { id: "lava_bg", name: "Лава", category: "background", price: 200, rarity: "epic", style: "linear-gradient(135deg,#f12711,#f5af19)" },
            { id: "forest_bg", name: "Лес", category: "background", price: 200, rarity: "rare", style: "linear-gradient(135deg,#134e5e,#71b280)" },
            { id: "night_bg", name: "Ночь", category: "background", price: 300, rarity: "epic", style: "linear-gradient(135deg,#141e30,#243b55)" },
            { id: "cyber_bg", name: "Киберпанк", category: "background", price: 400, rarity: "epic", style: "linear-gradient(135deg,#00f260,#0575e6)" },
            { id: "default_x", name: "Классический X", category: "xskin", price: 0, rarity: "common", symbol: "❌" },
            { id: "skull_x", name: "Череп", category: "xskin", price: 100, rarity: "common", symbol: "💀" },
            { id: "sword_x", name: "Меч", category: "xskin", price: 150, rarity: "rare", symbol: "⚔️" },
            { id: "crown_x", name: "Корона", category: "xskin", price: 200, rarity: "rare", symbol: "👑" },
            { id: "dragon_x", name: "Дракон", category: "xskin", price: 250, rarity: "epic", symbol: "🐉" },
            { id: "fire_x", name: "Огонь", category: "xskin", price: 300, rarity: "epic", symbol: "🔥" },
            { id: "star_x", name: "Звезда", category: "xskin", price: 350, rarity: "epic", symbol: "⭐" }
        ];

        // Загрузка таблицы лидеров из Firebase
        function loadLeaderboard() {
            const leaderboardRef = database.ref('leaderboard');

            leaderboardRef.on('value', (snapshot) => {
                const data = snapshot.val();
                const players = [];

                for (let id in data) {
                    players.push(data[id]);
                }

                players.sort((a, b) => b.stars - a.stars);
                displayLeaderboard(players);

                if (currentUser) {
                    let rank = players.findIndex(p => p.username === currentUser) + 1;
                    document.getElementById('playerRank').innerText = rank ? `#${rank}` : '-';
                }
            });
        }

        function displayLeaderboard(players) {
            const list = document.getElementById('leaderboardList');
            list.innerHTML = '';

            players.slice(0, 50).forEach((player, index) => {
                const div = document.createElement('div');
                div.className = 'leaderboard-item';

                if (index === 0) div.classList.add('top-1');
                if (index === 1) div.classList.add('top-2');
                if (index === 2) div.classList.add('top-3');
                if (player.username === currentUser) div.classList.add('current-user');

                div.innerHTML = `
                        <div class="rank">#${index + 1}</div>
                        <div class="player-info">
                            <div class="player-name">${player.username}</div>
                        </div>
                        <div class="player-score">${player.stars}</div>
                    `;

                list.appendChild(div);
            });

            document.getElementById('leaderboardCount').innerText = `Всего игроков: ${players.length}`;
        }

        // Сохранение в Firebase
        function saveToLeaderboard() {
            if (!currentUser) return;

            const leaderboardRef = database.ref('leaderboard/' + currentUser.replace('@', ''));
            leaderboardRef.set({
                username: currentUser,
                stars: stars,
                wins: stats.wins
            });
        }

        // Регистрация
        function handleRegister() {
            let username = document.getElementById('loginUsername').value.trim();
            let password = document.getElementById('loginPassword').value.trim();

            if (!username || !password) {
                alert('Заполните все поля!');
                return;
            }

            if (password.length !== 4 || isNaN(password)) {
                alert('Пароль должен быть 4 цифры!');
                return;
            }

            if (!username.startsWith('@')) {
                username = '@' + username;
            }

            currentUser = username;
            stars = 0;
            stats = { wins: 0, losses: 0, draws: 0 };
            matchHistory = ['🎉 Аккаунт создан'];

            document.getElementById('welcomeOverlay').style.display = 'none';
            document.getElementById('userDisplay').innerText = '👤 ' + currentUser;
            document.getElementById('profileUsername').innerText = currentUser;

            saveToLeaderboard();
            updateUI();
        }

        // Вход
        function handleLogin() {
            let username = document.getElementById('loginUsername').value.trim();

            if (!username) {
                alert('Введите username!');
                return;
            }

            if (!username.startsWith('@')) {
                username = '@' + username;
            }

            currentUser = username;
            stars = 0;
            stats = { wins: 0, losses: 0, draws: 0 };
            matchHistory = ['🔑 Вход выполнен'];

            document.getElementById('welcomeOverlay').style.display = 'none';
            document.getElementById('userDisplay').innerText = '👤 ' + currentUser;
            document.getElementById('profileUsername').innerText = currentUser;

            saveToLeaderboard();
            updateUI();
        }

        function logout() {
            currentUser = null;
            document.getElementById('welcomeOverlay').style.display = 'flex';
            resetGame();
        }

        function updateUI() {
            document.getElementById('starsDisplay').innerText = '⭐ ' + stars;
            document.getElementById('modalStars').innerText = stars + ' ⭐';
            document.getElementById('totalWins').innerText = stats.wins;
            document.getElementById('totalLosses').innerText = stats.losses;
            document.getElementById('totalDraws').innerText = stats.draws;

            let mh = document.getElementById('matchHistory');
            mh.innerHTML = '';
            matchHistory.slice(-10).reverse().forEach(m => {
                let div = document.createElement('div');
                div.className = 'historyItem';
                if (m.includes('Победа')) div.classList.add('win');
                if (m.includes('Поражение')) div.classList.add('loss');
                if (m.includes('Ничья')) div.classList.add('draw');
                div.innerText = m;
                mh.appendChild(div);
            });
        }

        // Игра
        let board = ["", "", "", "", "", "", "", "", ""];
        let gameOver = false;

        function createBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            board.forEach((cell, i) => {
                let div = document.createElement('div');
                div.className = 'cell';
                div.innerText = cell;
                div.onclick = () => playerMove(i);
                boardEl.appendChild(div);
            });
        }

        function playerMove(i) {
            if (board[i] !== '' || gameOver || !currentUser) return;

            board[i] = 'X';
            createBoard();

            if (checkWin('X')) {
                stars += 15;
                stats.wins++;
                endGame('Победа');
                return;
            }
            if (isDraw()) {
                stats.draws++;
                endGame('Ничья');
                return;
            }
            setTimeout(aiMove, 300);
        }

        function aiMove() {
            let empty = board.reduce((acc, cell, i) => cell === '' ? [...acc, i] : acc, []);
            if (empty.length === 0) return;

            if (Math.random() < 0.3) {
                let move = empty[Math.floor(Math.random() * empty.length)];
                board[move] = 'O';
                createBoard();
                if (checkWin('O')) {
                    stats.losses++;
                    endGame('Поражение');
                }
                return;
            }

            for (let move of empty) {
                board[move] = 'O';
                if (checkWin('O')) {
                    createBoard();
                    stats.losses++;
                    endGame('Поражение');
                    return;
                }
                board[move] = '';
            }

            for (let move of empty) {
                board[move] = 'X';
                if (checkWin('X')) {
                    board[move] = 'O';
                    createBoard();
                    stats.losses++;
                    endGame('Поражение');
                    return;
                }
                board[move] = '';
            }

            let priority = [4, 0, 2, 6, 8, 1, 3, 5, 7];
            for (let move of priority) {
                if (board[move] === '') {
                    board[move] = 'O';
                    createBoard();
                    if (checkWin('O')) {
                        stats.losses++;
                        endGame('Поражение');
                    }
                    return;
                }
            }
        }

        function checkWin(p) {
            const wins = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];
            return wins.some(combo => combo.every(i => board[i] === p));
        }

        function isDraw() {
            return board.every(c => c !== '');
        }

        function endGame(result) {
            gameOver = true;
            document.getElementById('status').innerText = result;
            matchHistory.push(result + ' - ' + new Date().toLocaleString());
            saveToLeaderboard();
            updateUI();
        }

        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            gameOver = false;
            document.getElementById('status').innerText = 'Твой ход (X)';
            createBoard();
        }

        function openProfile() {
            if (currentUser) {
                document.getElementById('profileModal').style.display = 'flex';
            }
        }

        function closeProfile() {
            document.getElementById('profileModal').style.display = 'none';
        }

        function openShop() {
            document.getElementById('shopModal').style.display = 'flex';
        }

        function closeShop() {
            document.getElementById('shopModal').style.display = 'none';
        }

        function showCategory(cat) {
            // Простая заглушка для магазина
        }

        // Запуск
        createBoard();
        loadLeaderboard();
    </script>
</body>
</html>
