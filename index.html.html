<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe Stars PRO</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.6s ease;
            background: #0f0f0f;
            position: relative;
            overflow: hidden;
        }

        /* Фоновые звезды */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.2;
            }

            50% {
                opacity: 1;
            }
        }

        /* ===== ПРОФИЛЬ ===== */
        #profileBox {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(28, 28, 28, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 100;
            border: 1px solid rgba(74, 144, 226, 0.5);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

            #profileBox:hover {
                border-color: #4a90e2;
                transform: translateY(-2px);
                box-shadow: 0 8px 25px rgba(74, 144, 226, 0.3);
            }

        #userDisplay {
            font-weight: bold;
            background: #4a90e2;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 14px;
        }

        #starsDisplay {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 16px;
        }

        /* ===== КНОПКИ МЕНЮ ===== */
        #menuButtons {
            position: absolute;
            top: 20px;
            right: 280px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .menu-btn {
            padding: 10px 18px;
            background: rgba(51, 51, 51, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

            .menu-btn:hover {
                background: #4a90e2;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(74, 144, 226, 0.4);
            }

            .menu-btn#logoutBtn {
                background: rgba(139, 0, 0, 0.9);
            }

                .menu-btn#logoutBtn:hover {
                    background: #a52a2a;
                }

        /* ===== ТАБЛИЦА ЛИДЕРОВ ===== */
        #leaderboardBox {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 280px;
            background: rgba(28, 28, 28, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid rgba(74, 144, 226, 0.3);
            z-index: 90;
            max-height: 80vh;
            overflow-y: auto;
        }

            #leaderboardBox h3 {
                margin-bottom: 20px;
                color: #4a90e2;
                font-size: 20px;
                display: flex;
                align-items: center;
                gap: 10px;
                border-bottom: 1px solid #333;
                padding-bottom: 10px;
                position: sticky;
                top: 0;
                background: rgba(28, 28, 28, 0.95);
                z-index: 2;
            }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            margin: 5px 0;
            background: rgba(17, 17, 17, 0.8);
            border-radius: 12px;
            transition: 0.3s;
            border: 1px solid transparent;
        }

            .leaderboard-item:hover {
                border-color: #4a90e2;
                transform: translateX(5px);
                background: rgba(30, 30, 30, 0.9);
            }

            .leaderboard-item.top-1 {
                background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05));
                border-color: gold;
            }

            .leaderboard-item.top-2 {
                background: linear-gradient(135deg, rgba(192,192,192,0.2), rgba(192,192,192,0.05));
                border-color: silver;
            }

            .leaderboard-item.top-3 {
                background: linear-gradient(135deg, rgba(205,127,50,0.2), rgba(205,127,50,0.05));
                border-color: #cd7f32;
            }

            .leaderboard-item.current-user {
                border: 2px solid #4a90e2;
                background: rgba(74, 144, 226, 0.1);
            }

        .rank {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #333;
            border-radius: 50%;
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
        }

        .top-1 .rank {
            background: gold;
            color: #000;
        }

        .top-2 .rank {
            background: silver;
            color: #000;
        }

        .top-3 .rank {
            background: #cd7f32;
            color: #000;
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-name {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-stats {
            display: flex;
            gap: 10px;
            font-size: 11px;
            color: #aaa;
        }

            .player-stats span {
                display: flex;
                align-items: center;
                gap: 3px;
            }

        .player-score {
            font-weight: bold;
            color: #4a90e2;
            font-size: 16px;
            flex-shrink: 0;
        }

        .leaderboard-count {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            font-size: 12px;
            color: #aaa;
        }

        /* ===== ИСТОРИЯ ===== */
        #matchHistoryBox {
            position: absolute;
            left: 330px;
            top: 50%;
            transform: translateY(-50%);
            width: 240px;
            background: rgba(28, 28, 28, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid rgba(74, 144, 226, 0.3);
            max-height: 70vh;
            overflow-y: auto;
        }

            #matchHistoryBox h3 {
                margin-bottom: 20px;
                color: #4a90e2;
                font-size: 18px;
                display: flex;
                align-items: center;
                gap: 8px;
                border-bottom: 1px solid #333;
                padding-bottom: 10px;
                position: sticky;
                top: 0;
                background: rgba(28, 28, 28, 0.95);
            }

        .historyItem {
            background: rgba(17, 17, 17, 0.8);
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            font-size: 12px;
            border-left: 3px solid;
            transition: 0.2s;
        }

            .historyItem:hover {
                transform: translateX(3px);
            }

        /* ===== МОДАЛКИ ===== */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modalContent {
            background: rgba(28, 28, 28, 0.98);
            backdrop-filter: blur(10px);
            width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 30px;
            border-radius: 25px;
            border: 2px solid #4a90e2;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .closeBtn {
            float: right;
            cursor: pointer;
            font-size: 24px;
            color: #999;
            transition: 0.2s;
        }

            .closeBtn:hover {
                color: white;
                transform: rotate(90deg);
            }

        /* ===== ИГРА ===== */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid rgba(74, 144, 226, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

            .container h2 {
                font-size: 28px;
                margin-bottom: 15px;
                background: linear-gradient(135deg, #fff, #4a90e2);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

        #status {
            font-size: 18px;
            margin-bottom: 15px;
            color: #4a90e2;
            font-weight: bold;
        }

        .board {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(3,100px);
            grid-template-rows: repeat(3,100px);
            gap: 8px;
        }

        .cell {
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(5px);
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 15px;
            transition: 0.3s;
            height: 100px;
            width: 100px;
            border: 2px solid transparent;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

            .cell:hover {
                background: rgba(50, 50, 50, 0.9);
                border-color: #4a90e2;
                transform: scale(1.02);
            }

            .cell:active {
                transform: scale(0.98);
            }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #333, #444);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

            button:hover {
                background: linear-gradient(135deg, #4a90e2, #357abd);
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(74, 144, 226, 0.3);
            }

        /* ===== МАГАЗИН ===== */
        .shopCategory {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

            .shopCategory button {
                flex: 1;
                min-width: 100px;
                margin-top: 0;
            }

                .shopCategory button.active {
                    background: #4a90e2;
                }

        .shopItem {
            background: rgba(17, 17, 17, 0.9);
            padding: 20px;
            margin: 15px 0;
            border-radius: 15px;
            border: 1px solid #333;
            transition: 0.3s;
        }

            .shopItem:hover {
                border-color: #4a90e2;
                transform: translateX(5px);
            }

        .shopPreview {
            height: 80px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            background: #1e1e1e;
        }

        .item-rarity {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 10px;
            font-weight: bold;
        }

        .rarity-common {
            background: #808080;
        }

        .rarity-rare {
            background: #4a90e2;
        }

        .rarity-epic {
            background: #9b59b6;
        }

        /* ===== ПРИВЕТСТВИЕ ===== */
        #welcomeOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #welcomeBox {
            background: rgba(28, 28, 28, 0.98);
            padding: 50px;
            border-radius: 30px;
            width: 420px;
            text-align: center;
            border: 2px solid #4a90e2;
            box-shadow: 0 30px 60px rgba(74, 144, 226, 0.3);
        }

            #welcomeBox h2 {
                font-size: 32px;
                margin-bottom: 20px;
                background: linear-gradient(135deg, #fff, #4a90e2);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            #welcomeBox input {
                width: 100%;
                padding: 15px;
                margin: 10px 0;
                background: rgba(51, 51, 51, 0.9);
                border: 2px solid #4a90e2;
                color: white;
                border-radius: 50px;
                font-size: 16px;
                box-sizing: border-box;
            }

        #loginPassword {
            font-size: 24px;
            letter-spacing: 8px;
            text-align: center;
        }

        #welcomeBox button {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            font-size: 16px;
            cursor: pointer;
        }

        #registerBtn {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }

        #authError {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        /* ===== СТАТИСТИКА ===== */
        .stats {
            background: rgba(17, 17, 17, 0.9);
            padding: 20px;
            border-radius: 15px;
            margin: 15px 0;
        }

        .statItem {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: rgba(26, 26, 26, 0.9);
            border-radius: 10px;
            border-left: 3px solid #4a90e2;
        }
    </style>
</head>
<body>

    <!-- Фоновые звезды -->
    <div class="stars" id="stars"></div>

    <div id="welcomeOverlay">
        <div id="welcomeBox">
            <h2>🎮 Tic Tac Toe Stars</h2>
            <p>Введите данные для входа</p>
            <input type="text" id="loginUsername" placeholder="@username" value="">
            <input type="password" id="loginPassword" placeholder="4-значный пароль" maxlength="4">
            <div id="authError"></div>
            <button onclick="handleLogin()">🔑 Войти</button>
            <button id="registerBtn" onclick="handleRegister()">✨ Зарегистрироваться</button>
        </div>
    </div>

    <div id="menuButtons">
        <button class="menu-btn" id="shopBtn" onclick="openShop()">🛒 Магазин</button>
        <button class="menu-btn" id="logoutBtn" onclick="logout()">🚪 Выйти</button>
    </div>

    <div id="profileBox" onclick="openProfile()">
        <div id="userDisplay">👤 Загрузка...</div>
        <div id="starsDisplay">⭐ 0</div>
    </div>

    <!-- Таблица лидеров (ВСЕ игроки) -->
    <div id="leaderboardBox">
        <h3>🏆 Топ игроков</h3>
        <div id="leaderboardList"></div>
        <div class="leaderboard-count" id="leaderboardCount">Всего игроков: 0</div>
    </div>

    <!-- История матчей -->
    <div id="matchHistoryBox">
        <h3>📊 Последние матчи</h3>
        <div id="matchHistory"></div>
    </div>

    <!-- Модалка профиля -->
    <div id="profileModal" class="modal">
        <div class="modalContent">
            <div class="closeBtn" onclick="closeProfile()">✖</div>
            <h2>👤 Профиль</h2>
            <div class="stats">
                <div class="statItem"><span>Telegram:</span> <span id="profileUsername"></span></div>
                <div class="statItem"><span>Баланс:</span> <span id="modalStars">0 ⭐</span></div>
                <div class="statItem"><span>Побед:</span> <span id="totalWins">0</span></div>
                <div class="statItem"><span>Поражений:</span> <span id="totalLosses">0</span></div>
                <div class="statItem"><span>Ничьих:</span> <span id="totalDraws">0</span></div>
                <div class="statItem"><span>Всего игр:</span> <span id="totalGames">0</span></div>
                <div class="statItem"><span>Место в рейтинге:</span> <span id="playerRank">-</span></div>
            </div>
            <h3>📜 История выводов</h3>
            <div id="withdrawHistory"></div>
            <button onclick="withdraw()" id="withdrawBtn" style="width:100%;">💸 Вывести 100 ⭐</button>
            <div id="withdrawTimer" style="text-align:center; margin-top:10px;"></div>
        </div>
    </div>

    <!-- Модалка магазина -->
    <div id="shopModal" class="modal">
        <div class="modalContent">
            <div class="closeBtn" onclick="closeShop()">✖</div>
            <h2>🛍️ Магазин</h2>
            <div class="shopCategory">
                <button onclick="showCategory('background')" id="catBackground">Фоны</button>
                <button onclick="showCategory('xskin')" id="catXskin">Скины X</button>
            </div>
            <div id="shopItems"></div>
        </div>
    </div>

    <div class="container">
        <h2>❌ Крестики-Нолики ⭕</h2>
        <div id="status">Твой ход (X)</div>
        <div class="board" id="board"></div>
        <button onclick="resetGame()">🔄 Новая игра</button>
    </div>

    <script>
        // Создание фоновых звезд
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // Данные текущего игрока
        let currentUser = null;
        let stars = 0;
        let matchHistory = [];
        let withdrawHistory = [];
        let withdrawEndTime = null;
        let ownedItems = ["default_bg", "default_x"];
        let equipped = {
            background: "default_bg",
            xskin: "default_x"
        };
        let stats = {
            wins: 0,
            losses: 0,
            draws: 0
        };

        // Товары в магазине
        const shopItems = [
            { id: "default_bg", name: "Стандарт", category: "background", price: 0, rarity: "common", style: "#0f0f0f" },
            { id: "sunset_bg", name: "Закат", category: "background", price: 50, rarity: "common", style: "linear-gradient(135deg,#ff512f,#dd2476)" },
            { id: "ocean_bg", name: "Океан", category: "background", price: 80, rarity: "common", style: "linear-gradient(135deg,#2193b0,#6dd5ed)" },
            { id: "neon_bg", name: "Неон", category: "background", price: 120, rarity: "rare", style: "linear-gradient(135deg,#0f0c29,#302b63,#24243e)" },
            { id: "galaxy_bg", name: "Галактика", category: "background", price: 150, rarity: "rare", style: "radial-gradient(circle,#1e3c72,#2a5298,#000)" },
            { id: "lava_bg", name: "Лава", category: "background", price: 200, rarity: "epic", style: "linear-gradient(135deg,#f12711,#f5af19)" },
            { id: "forest_bg", name: "Лес", category: "background", price: 200, rarity: "rare", style: "linear-gradient(135deg,#134e5e,#71b280)" },
            { id: "night_bg", name: "Ночь", category: "background", price: 300, rarity: "epic", style: "linear-gradient(135deg,#141e30,#243b55)" },
            { id: "cyber_bg", name: "Киберпанк", category: "background", price: 400, rarity: "epic", style: "linear-gradient(135deg,#00f260,#0575e6)" },
            { id: "default_x", name: "Классический X", category: "xskin", price: 0, rarity: "common", symbol: "❌" },
            { id: "skull_x", name: "Череп", category: "xskin", price: 100, rarity: "common", symbol: "💀" },
            { id: "sword_x", name: "Меч", category: "xskin", price: 150, rarity: "rare", symbol: "⚔️" },
            { id: "crown_x", name: "Корона", category: "xskin", price: 200, rarity: "rare", symbol: "👑" },
            { id: "dragon_x", name: "Дракон", category: "xskin", price: 250, rarity: "epic", symbol: "🐉" },
            { id: "fire_x", name: "Огонь", category: "xskin", price: 300, rarity: "epic", symbol: "🔥" },
            { id: "star_x", name: "Звезда", category: "xskin", price: 350, rarity: "epic", symbol: "⭐" }
        ];

        // Загрузка при старте
        window.onload = function () {
            let lastUser = localStorage.getItem("lastUser");
            if (lastUser) {
                let users = getAllUsers();
                if (users[lastUser]) {
                    currentUser = lastUser;
                    loadUserData(users[lastUser]);
                    document.getElementById("welcomeOverlay").style.display = "none";
                }
            }
            createBoard();
            updateLeaderboard();
        };

        // Система аккаунтов
        function getAllUsers() {
            let users = localStorage.getItem("allUsers");
            return users ? JSON.parse(users) : {};
        }

        function saveAllUsers(users) {
            localStorage.setItem("allUsers", JSON.stringify(users));
        }

        function validatePassword(password) {
            return /^\d{4}$/.test(password);
        }

        function handleLogin() {
            let username = document.getElementById("loginUsername").value.trim();
            let password = document.getElementById("loginPassword").value.trim();
            let errorDiv = document.getElementById("authError");

            if (!username || !password) {
                errorDiv.style.display = "block";
                errorDiv.innerText = "Заполните все поля!";
                return;
            }

            if (!validatePassword(password)) {
                errorDiv.style.display = "block";
                errorDiv.innerText = "Пароль должен быть 4 цифры!";
                return;
            }

            if (!username.startsWith('@')) {
                username = "@" + username;
            }

            let users = getAllUsers();

            if (users[username] && users[username].password === password) {
                currentUser = username;
                loadUserData(users[username]);
                document.getElementById("welcomeOverlay").style.display = "none";
                errorDiv.style.display = "none";
                localStorage.setItem("lastUser", username);
                updateLeaderboard();
            } else {
                errorDiv.style.display = "block";
                errorDiv.innerText = "Неверный username или пароль!";
            }
        }

        function handleRegister() {
            let username = document.getElementById("loginUsername").value.trim();
            let password = document.getElementById("loginPassword").value.trim();
            let errorDiv = document.getElementById("authError");

            if (!username || !password) {
                errorDiv.style.display = "block";
                errorDiv.innerText = "Заполните все поля!";
                return;
            }

            if (!validatePassword(password)) {
                errorDiv.style.display = "block";
                errorDiv.innerText = "Пароль должен быть 4 цифры!";
                return;
            }

            if (!username.startsWith('@')) {
                username = "@" + username;
            }

            let users = getAllUsers();

            if (users[username]) {
                errorDiv.style.display = "block";
                errorDiv.innerText = "Такой пользователь уже существует!";
            } else {
                let newUserData = {
                    password: password,
                    stars: 0,
                    matchHistory: ["🎉 Аккаунт создан"],
                    withdrawHistory: [],
                    withdrawEndTime: null,
                    ownedItems: ["default_bg", "default_x"],
                    equipped: {
                        background: "default_bg",
                        xskin: "default_x"
                    },
                    stats: { wins: 0, losses: 0, draws: 0 }
                };

                users[username] = newUserData;
                saveAllUsers(users);

                currentUser = username;
                loadUserData(newUserData);
                document.getElementById("welcomeOverlay").style.display = "none";
                errorDiv.style.display = "none";
                localStorage.setItem("lastUser", username);
                updateLeaderboard();
            }
        }

        function loadUserData(userData) {
            stars = userData.stars || 0;
            matchHistory = userData.matchHistory || [];
            withdrawHistory = userData.withdrawHistory || [];
            withdrawEndTime = userData.withdrawEndTime || null;
            ownedItems = userData.ownedItems || ["default_bg", "default_x"];
            equipped = userData.equipped || { background: "default_bg", xskin: "default_x" };
            stats = userData.stats || { wins: 0, losses: 0, draws: 0 };

            document.getElementById("userDisplay").innerText = "👤 " + currentUser;
            document.getElementById("profileUsername").innerText = currentUser;

            applyBackground();
            updateUI();
            checkTimer();
            updateLeaderboard();
        }

        function saveCurrentUser() {
            if (!currentUser) return;

            let users = getAllUsers();
            users[currentUser] = {
                password: users[currentUser]?.password || "0000",
                stars: stars,
                matchHistory: matchHistory,
                withdrawHistory: withdrawHistory,
                withdrawEndTime: withdrawEndTime,
                ownedItems: ownedItems,
                equipped: equipped,
                stats: stats
            };
            saveAllUsers(users);
            updateLeaderboard();
        }

        function logout() {
            currentUser = null;
            document.getElementById("welcomeOverlay").style.display = "flex";
            document.getElementById("loginUsername").value = "";
            document.getElementById("loginPassword").value = "";
            localStorage.removeItem("lastUser");
            resetGame();
            updateLeaderboard();
        }

        // ===== ТАБЛИЦА ЛИДЕРОВ (ВСЕ ИГРОКИ) =====
        function updateLeaderboard() {
            let users = getAllUsers();
            let leaderboard = [];

            // Собираем ВСЕХ игроков
            for (let username in users) {
                let user = users[username];
                leaderboard.push({
                    username: username,
                    stars: user.stars || 0,
                    wins: user.stats?.wins || 0,
                    totalGames: (user.stats?.wins || 0) + (user.stats?.losses || 0) + (user.stats?.draws || 0)
                });
            }

            // Сортируем по звездам (по убыванию)
            leaderboard.sort((a, b) => b.stars - a.stars);

            // Отображаем ВСЕХ игроков
            let leaderboardList = document.getElementById("leaderboardList");
            leaderboardList.innerHTML = "";

            for (let i = 0; i < leaderboard.length; i++) {
                let player = leaderboard[i];
                let div = document.createElement("div");
                div.className = "leaderboard-item";

                // Топ-3 получают особые цвета
                if (i === 0) div.classList.add("top-1");
                if (i === 1) div.classList.add("top-2");
                if (i === 2) div.classList.add("top-3");

                // Подсвечиваем текущего игрока
                if (player.username === currentUser) {
                    div.classList.add("current-user");
                }

                div.innerHTML = `
                        <div class="rank">#${i + 1}</div>
                        <div class="player-info">
                            <div class="player-name">${player.username}</div>
                        </div>
                        <div class="player-score">${player.stars}</div>
                    `;

                leaderboardList.appendChild(div);
            }

            // Обновляем счетчик игроков
            document.getElementById("leaderboardCount").innerText = `Всего игроков: ${leaderboard.length}`;

            // Обновляем место текущего игрока в профиле
            if (currentUser) {
                let rank = leaderboard.findIndex(p => p.username === currentUser) + 1;
                document.getElementById("playerRank").innerText = rank ? `#${rank}` : "-";
            } else {
                document.getElementById("playerRank").innerText = "-";
            }
        }

        // Обновление UI
        function updateUI() {
            document.getElementById("starsDisplay").innerText = "⭐ " + stars;
            document.getElementById("modalStars").innerText = stars + " ⭐";

            document.getElementById("totalWins").innerText = stats.wins;
            document.getElementById("totalLosses").innerText = stats.losses;
            document.getElementById("totalDraws").innerText = stats.draws;
            document.getElementById("totalGames").innerText = stats.wins + stats.losses + stats.draws;

            let mh = document.getElementById("matchHistory");
            mh.innerHTML = "";
            matchHistory.slice(-10).reverse().forEach(m => {
                let div = document.createElement("div");
                div.className = "historyItem";
                if (m.includes("Победа")) div.style.borderLeftColor = "#4caf50";
                if (m.includes("Поражение")) div.style.borderLeftColor = "#f44336";
                if (m.includes("Ничья")) div.style.borderLeftColor = "#ff9800";
                div.innerText = m;
                mh.appendChild(div);
            });

            let wh = document.getElementById("withdrawHistory");
            wh.innerHTML = "";
            withdrawHistory.slice(-5).reverse().forEach(w => {
                let div = document.createElement("div");
                div.className = "historyItem";
                div.innerText = w;
                wh.appendChild(div);
            });
        }

        // Магазин
        let currentCategory = 'background';

        function openShop() {
            document.getElementById("shopModal").style.display = "flex";
            showCategory('background');
        }

        function closeShop() {
            document.getElementById("shopModal").style.display = "none";
        }

        function showCategory(category) {
            currentCategory = category;

            document.getElementById("catBackground").className = "";
            document.getElementById("catXskin").className = "";
            document.getElementById("cat" + category.charAt(0).toUpperCase() + category.slice(1)).className = "active";

            renderShop();
        }

        function renderShop() {
            let container = document.getElementById("shopItems");
            container.innerHTML = "";

            let filtered = shopItems.filter(item => item.category === currentCategory);

            filtered.forEach(item => {
                let div = document.createElement("div");
                div.className = "shopItem";

                let rarityClass = "rarity-" + item.rarity;

                if (item.category === "background") {
                    div.innerHTML = `
                            <div class="shopPreview" style="background:${item.style}"></div>
                            <strong>${item.name}</strong>
                            <span class="item-rarity ${rarityClass}">${item.rarity}</span><br>
                            Цена: ${item.price} ⭐<br>
                        `;
                } else {
                    div.innerHTML = `
                            <div class="shopPreview">${item.symbol}</div>
                            <strong>${item.name}</strong>
                            <span class="item-rarity ${rarityClass}">${item.rarity}</span><br>
                            Цена: ${item.price} ⭐<br>
                        `;
                }

                let btn = document.createElement("button");

                if (ownedItems.includes(item.id)) {
                    if (equipped[item.category] === item.id) {
                        btn.innerText = "✅ Экипировано";
                        btn.disabled = true;
                    } else {
                        btn.innerText = "📦 Экипировать";
                        btn.onclick = function () { equipItem(item); };
                    }
                } else {
                    btn.innerText = "💎 Купить";
                    btn.onclick = function () { buyItem(item); };
                }

                div.appendChild(btn);
                container.appendChild(div);
            });
        }

        function buyItem(item) {
            if (stars < item.price) {
                alert("❌ Недостаточно ⭐");
                return;
            }

            stars -= item.price;
            ownedItems.push(item.id);
            saveCurrentUser();
            renderShop();
            updateUI();
            alert(`✅ Куплено: ${item.name}`);
        }

        function equipItem(item) {
            equipped[item.category] = item.id;

            if (item.category === 'background') {
                applyBackground();
            } else {
                createBoard();
            }

            saveCurrentUser();
            renderShop();
        }

        function applyBackground() {
            let bg = shopItems.find(i => i.id === equipped.background);
            if (bg) {
                document.body.style.background = bg.style;
            }
        }

        // Игра
        let board = ["", "", "", "", "", "", "", "", ""];
        let gameOver = false;

        function getSymbol() {
            let xskin = shopItems.find(i => i.id === equipped.xskin);
            return xskin ? xskin.symbol : "❌";
        }

        function createBoard() {
            const boardEl = document.getElementById("board");
            boardEl.innerHTML = "";
            board.forEach((cell, i) => {
                let div = document.createElement("div");
                div.className = "cell";
                if (cell === "X") {
                    div.innerText = getSymbol();
                } else if (cell === "O") {
                    div.innerText = "⭕";
                } else {
                    div.innerText = "";
                }
                div.onclick = function () { playerMove(i); };
                boardEl.appendChild(div);
            });
        }

        function playerMove(i) {
            if (board[i] !== "" || gameOver || !currentUser) return;

            board[i] = "X";
            createBoard();

            if (checkWin(board, "X")) {
                stars += 15;
                endGame("Победа");
                return;
            }
            if (isDraw(board)) {
                endGame("Ничья");
                return;
            }
            setTimeout(aiMove, 300);
        }

        // Сбалансированный бот
        function aiMove() {
            let empty = [];
            for (let i = 0; i < 9; i++) {
                if (board[i] === "") empty.push(i);
            }

            if (empty.length === 0) return;

            // 30% шанс на глупый ход
            if (Math.random() < 0.3) {
                let randomMove = empty[Math.floor(Math.random() * empty.length)];
                board[randomMove] = "O";
                createBoard();
                if (checkWin(board, "O")) {
                    endGame("Поражение");
                    return;
                }
                if (isDraw(board)) {
                    endGame("Ничья");
                    return;
                }
                return;
            }

            // 70% шанс играть умно
            for (let i = 0; i < empty.length; i++) {
                let move = empty[i];
                board[move] = "O";
                if (checkWin(board, "O")) {
                    createBoard();
                    endGame("Поражение");
                    return;
                }
                board[move] = "";
            }

            for (let i = 0; i < empty.length; i++) {
                let move = empty[i];
                board[move] = "X";
                if (checkWin(board, "X")) {
                    board[move] = "O";
                    createBoard();
                    if (checkWin(board, "O")) {
                        endGame("Поражение");
                        return;
                    }
                    return;
                }
                board[move] = "";
            }

            let priorityMoves = [4, 0, 2, 6, 8, 1, 3, 5, 7];

            for (let i = 0; i < priorityMoves.length; i++) {
                let move = priorityMoves[i];
                if (board[move] === "") {
                    board[move] = "O";
                    createBoard();
                    if (checkWin(board, "O")) {
                        endGame("Поражение");
                        return;
                    }
                    if (isDraw(board)) {
                        endGame("Ничья");
                        return;
                    }
                    return;
                }
            }
        }

        function checkWin(b, p) {
            const wins = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];
            return wins.some(combo => combo.every(i => b[i] === p));
        }

        function isDraw(b) {
            return b.every(c => c !== "");
        }

        function endGame(result) {
            gameOver = true;
            document.getElementById("status").innerText = result;

            if (result === "Победа") stats.wins++;
            else if (result === "Поражение") stats.losses++;
            else if (result === "Ничья") stats.draws++;

            matchHistory.push(result + " - " + new Date().toLocaleString());
            saveCurrentUser();
            updateUI();
            updateLeaderboard();
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            gameOver = false;
            document.getElementById("status").innerText = "Твой ход (X)";
            createBoard();
        }

        // Профиль
        function openProfile() {
            if (currentUser) {
                document.getElementById("profileModal").style.display = "flex";
            }
        }

        function closeProfile() {
            document.getElementById("profileModal").style.display = "none";
        }

        // Вывод средств
        function withdraw() {
            if (!currentUser) return;
            if (stars < 100) {
                alert("❌ Недостаточно ⭐");
                return;
            }
            if (withdrawEndTime) {
                alert("❌ Вывод уже запрошен");
                return;
            }

            stars -= 100;
            withdrawEndTime = Date.now() + 3 * 60 * 60 * 1000;
            withdrawHistory.push("💸 Запрос 100 ⭐ - " + new Date().toLocaleString());
            saveCurrentUser();
            updateUI();
            checkTimer();
        }

        function checkTimer() {
            if (!withdrawEndTime) return;

            const timerEl = document.getElementById("withdrawTimer");
            const btn = document.getElementById("withdrawBtn");

            function update() {
                let diff = withdrawEndTime - Date.now();
                if (diff <= 0) {
                    withdrawEndTime = null;
                    timerEl.innerText = "";
                    btn.disabled = false;
                    saveCurrentUser();
                    return;
                }
                btn.disabled = true;
                let h = Math.floor(diff / 1000 / 60 / 60);
                let m = Math.floor((diff / 1000 / 60) % 60);
                let s = Math.floor((diff / 1000) % 60);
                timerEl.innerText = "⏳ Ожидание: " + h + "ч " + m + "м " + s + "с";
                setTimeout(update, 1000);
            }
            update();
        }
    </script>
</body>
</html>
